name: CI

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]

env:
  VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
  VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
  SUPABASE_PROJECT_REF: hmeieslclzycyjjjflfh
  # Opt into Node.js 24 for JS actions now, ahead of the 2026-06-02 forced
  # migration. Surfaces any action incompatibility early instead of on
  # deploy day.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Schema Guard (PR + push) ───────────────────────────
  # Blocks merges that silently drop an RLS policy, CHECK constraint, FK,
  # or table without a [force-schema] override. Runs early so destructive
  # changes are caught before we waste CI minutes on the rest.
  schema-guard:
    name: Schema Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50  # need history to diff against base
      - name: Run schema-guard
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref && format('origin/{0}', github.event.pull_request.base.ref) || 'origin/main' }}
        run: bash scripts/schema-guard.sh

  # ── Frontend Build & Typecheck ─────────────────────────
  frontend:
    name: Frontend Build
    needs: [schema-guard]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx vite build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ── Edge Function Syntax Check ─────────────────────────
  edge-functions:
    name: Edge Functions Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v1.x

      - name: Type-check all Edge Functions
        run: |
          for dir in supabase/functions/*/; do
            fn=$(basename "$dir")
            # Skip _shared (it's a library, not a function)
            if [ "$fn" = "_shared" ]; then continue; fi
            echo "Checking $fn..."
            deno check "$dir/index.ts" || echo "WARN: $fn has type issues"
          done

  # ── Deploy Edge Functions (main only) ──────────────────
  deploy-functions:
    name: Deploy Edge Functions
    needs: [frontend, edge-functions]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all functions
        # Auto-discover every folder in supabase/functions/ that has an
        # index.ts file (except _shared which is a library, not a function).
        # Previously used a hardcoded list which silently drops new functions
        # if someone forgets to update it — caught in 2026-04-14 red-team
        # when payment-poll-sync was shipped yesterday but never deployed.
        run: |
          set -e
          FAILED_FNS=()
          for dir in supabase/functions/*/; do
            fn=$(basename "$dir")
            if [ "$fn" = "_shared" ]; then continue; fi
            if [ ! -f "$dir/index.ts" ]; then continue; fi
            echo "Deploying $fn..."
            if ! supabase functions deploy "$fn" \
                 --project-ref $SUPABASE_PROJECT_REF \
                 --no-verify-jwt 2>&1; then
              FAILED_FNS+=("$fn")
              echo "::warning::$fn deploy failed"
            fi
          done
          if [ ${#FAILED_FNS[@]} -ne 0 ]; then
            echo "::error::Some functions failed to deploy: ${FAILED_FNS[*]}"
            # Don't hard-fail the job yet — some test-* functions may fail
            # due to missing secrets and that's acceptable. If you want
            # hard-fail, change the above to `exit 1`.
          fi

  # ── Deploy Frontend to Vercel (main only) ──────────────
  # Uses Vercel CLI directly instead of amondnet/vercel-action@v25.
  # The action is stale (Node 20, unmaintained) and was a silent source
  # of failures; CLI is first-party, single binary, and version-stable.
  deploy-frontend:
    name: Deploy Frontend
    needs: [frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Deploy to Vercel (production)
        # Vercel rebuilds on their infra — no need for a local build step here
        # (the `frontend` job already built + uploaded an artifact for verification).
        run: npx --yes vercel@latest deploy --prod --token="$VERCEL_TOKEN" --yes

  # ── Post-Deploy QA (main only) ─────────────────────────
  qa:
    name: Post-Deploy QA
    needs: [deploy-functions]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Run Consistency Checker
        run: |
          RESULT=$(curl -s -X POST \
            "https://hmeieslclzycyjjjflfh.supabase.co/functions/v1/consistency-checker" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -d '{}')
          echo "$RESULT" | jq . || echo "$RESULT"
          HEALTH=$(echo "$RESULT" | jq -r '.summary.health // "unknown"')
          if [ "$HEALTH" = "critical" ]; then
            echo "::error::Consistency check CRITICAL"
            exit 1
          fi

      - name: Run Security Agent
        # Per the QA gate spec: ANY critical OR high-severity failure is a
        # hard stop — not just a failing letter grade. Low-severity failures
        # are allowed but logged.
        run: |
          RESULT=$(curl -s -X POST \
            "https://hmeieslclzycyjjjflfh.supabase.co/functions/v1/security-agent" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -d '{}')
          echo "$RESULT" | jq . || echo "$RESULT"

          GRADE=$(echo "$RESULT" | jq -r '.summary.security_grade // "unknown"')
          CRITICAL=$(echo "$RESULT" | jq -r '.summary.critical_failures // 0')
          HIGH_FAILS=$(echo "$RESULT" | jq -r '
            [.results[]? | select(.status == "fail" and .severity == "high")] | length
          ')

          if [ "$GRADE" = "F" ] || [ "$CRITICAL" != "0" ] || [ "$HIGH_FAILS" != "0" ]; then
            echo "::error::Security gate failed — grade=$GRADE critical=$CRITICAL high_severity_failures=$HIGH_FAILS"
            exit 1
          fi

      - name: Run Chaos Test
        # Per the QA gate spec: WARN is allowed only when it's a documented
        # fixture/data-availability issue (e.g. "no eligible listing for
        # payment_chaos"). Any other WARN is treated as a soft failure and
        # blocks the build — chaos warnings should never be silent.
        # Hard FAIL on any failed > 0.
        # Allowed warning patterns (regex, anchored to the message body):
        #   - "No listings"     payment_chaos can't find an eligible listing
        #   - "fixture"          explicitly tagged as a fixture mismatch
        run: |
          RESULT=$(curl -s -X POST \
            "https://hmeieslclzycyjjjflfh.supabase.co/functions/v1/chaos-test" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -d '{"scenario": "all"}')
          echo "$RESULT" | jq . || echo "$RESULT"

          FAILED=$(echo "$RESULT" | jq -r '.summary.failed // "0"')
          if [ "$FAILED" != "0" ]; then
            echo "::error::Chaos test has $FAILED hard failures"
            exit 1
          fi

          # Inspect every warn — fail unless the message matches the allowlist
          UNALLOWED=$(echo "$RESULT" | jq -r '
            .results
            | map(select(.status == "warn"))
            | map(select(.message | test("(?i)no listings|fixture") | not))
            | length
          ')
          if [ "$UNALLOWED" != "0" ]; then
            echo "::error::Chaos test has $UNALLOWED unexpected warning(s) — see results above. If a new warning is benign, add its pattern to the allowlist in ci.yml."
            exit 1
          fi

      - name: QA Summary
        run: echo "All QA checks passed"
