<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#d4a843" />
    <title>Offline — Mimoo</title>
    <link rel="icon" type="image/png" href="/icons/icon-192x192.png" />
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5dc;
        color: #1f2937;
        -webkit-font-smoothing: antialiased;
      }
      .wrap {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
      }
      .icon {
        width: 88px;
        height: 88px;
        border-radius: 20px;
        background: #d4a843;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 24px;
        box-shadow: 0 4px 12px rgba(212, 168, 67, 0.3);
      }
      .icon svg { width: 44px; height: 44px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      h1 { font-size: 24px; margin: 0 0 8px; font-weight: 700; }
      p { margin: 0 0 24px; color: #6b7280; max-width: 320px; line-height: 1.5; }
      button {
        appearance: none;
        border: none;
        background: #059669;
        color: #fff;
        font-size: 16px;
        font-weight: 600;
        padding: 12px 24px;
        border-radius: 12px;
        cursor: pointer;
        min-height: 44px;
        min-width: 140px;
        transition: transform 0.15s ease, background 0.15s ease;
      }
      button:hover { background: #047857; }
      button:active { transform: scale(0.97); }
      .hint {
        margin-top: 32px;
        font-size: 13px;
        color: #9ca3af;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="icon" aria-hidden="true">
        <svg viewBox="0 0 24 24"><path d="M1 1l22 22" /><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" /><path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" /><path d="M10.71 5.05A16 16 0 0 1 22.58 9" /><path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" /><path d="M8.53 16.11a6 6 0 0 1 6.95 0" /><circle cx="12" cy="20" r="1" /></svg>
      </div>
      <h1>You're offline</h1>
      <p>Mimoo can't reach the internet right now. Check your connection and try again.</p>
      <button onclick="window.location.reload()">Retry</button>
      <p class="hint">Cached listings you've already viewed may still work.</p>
    </div>
  </body>
</html>
